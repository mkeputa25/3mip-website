  <path d="M9 9 h11 v3 l-5 4 q5 0 5 5 t-6 6 q-4 0 -5 -3"
        fill="none" stroke="#FAF7F2" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
