<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Favicon: "3M" wordmark variant (DECISIONS-V2 V6). Hand-drawn strokes
       echoing the Fraunces wordmark's voice — no font dependency in a
       favicon. Deep ink-brown tile, parchment marks. -->
  <rect width="32" height="32" rx="4" fill="#1A1612"/>
  <!-- 3 -->
  <path d="M5 10 h7 v2.4 l-3.4 2.8 q3.6 0 3.6 3.6 t-4.2 4.4 q-2.6 0 -3.4 -2"
        fill="none" stroke="#F5EFE4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- M -->
  <path d="M17 23 V10 l4.4 7 l4.4 -7 V23"
        fill="none" stroke="#F5EFE4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
